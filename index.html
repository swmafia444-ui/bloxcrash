<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxCrash | Premium Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0b0c0d; color: #e1e1e1; overflow: hidden; height: 100vh; }
        .neon-text { color: #14f195; text-shadow: 0 0 10px #14f19555; }
        .brand-blox { color: #ff9d00; text-shadow: 0 0 15px rgba(255, 157, 0, 0.4); } 
        .brand-crash { color: #ffffff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }
        .premium-btn { background: linear-gradient(135deg, #14f195 0%, #0dbb72 100%); color: #000; font-weight: 900; transition: 0.3s; border: none; }
        .premium-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 20px #14f19544; cursor: pointer; }
        .modal-overlay { background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 500; }
        .hidden { display: none; }
        .tab-active { border-bottom: 3px solid #14f195; color: #14f195 !important; }
        .auth-input { background: #141619; border: 2px solid #2d3139; padding: 18px; border-radius: 16px; width: 100%; outline: none; text-align: center; color: white; font-weight: 800; font-size: 1.2rem; }
        .auth-input:focus { border-color: #14f195; }
        .verify-box { background: #0b0c0d; border: 2px dashed #14f195; padding: 15px; border-radius: 12px; margin: 15px 0; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1c1f23; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col md:flex-row">

    <main class="flex-1 p-6 overflow-y-auto relative">
        <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-5">
            <h1 class="text-3xl font-black tracking-tighter uppercase italic select-none">
                <span class="brand-blox">Blox</span><span class="brand-crash">Crash</span>
            </h1>
            <div id="authSection">
                <button id="loginBtn" onclick="toggleModal('loginModal')" class="bg-[#1c1f23] hover:bg-[#25282c] px-8 py-2.5 rounded-xl font-bold transition border border-gray-700 uppercase tracking-widest text-xs text-white">Login</button>
                <div id="userInfo" class="hidden flex items-center gap-3">
                    <div class="bg-[#141619] px-5 py-2.5 rounded-xl border border-gray-800 flex flex-col items-end">
                        <span id="displayUsername" class="text-white font-bold text-[10px] uppercase">User</span>
                        <span id="invValueDisplay" class="neon-text font-black text-lg leading-none">0 Value</span>
                    </div>
                    <button onclick="logout()" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white p-3 rounded-xl transition border border-red-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="flex gap-10 border-b border-gray-800 mb-8">
            <button onclick="switchTab('lobby')" id="tab-lobby" class="pb-3 tab-active font-bold text-sm tracking-widest uppercase">Lobby</button>
            <button onclick="switchTab('history')" id="tab-history" class="pb-3 text-gray-500 font-bold text-sm tracking-widest uppercase hover:text-white transition">History</button>
        </div>

        <div id="lobbyContainer">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black uppercase tracking-tight">Active Battles</h2>
                <button onclick="checkAuth()" class="premium-btn px-8 py-3 rounded-xl text-sm uppercase">Create Match</button>
            </div>
            <div id="matchList" class="grid gap-4">
                <div id="emptyMsg" class="text-center py-24 border-2 border-dashed border-gray-800 rounded-3xl text-gray-600 font-bold uppercase tracking-widest">No Active Matches</div>
            </div>
        </div>

        <div id="historyContainer" class="hidden">
            <h2 class="text-xl font-black mb-6 text-[#14f195] uppercase italic">Recent Battles</h2>
            <div id="historyList" class="grid gap-3"></div>
        </div>
    </main>

    <aside class="w-full md:w-80 bg-[#0e0f10] border-l border-gray-800 flex flex-col shadow-2xl">
        <div class="p-5 border-b border-gray-800 bg-[#0b0c0d]">
            <h3 class="font-black text-[#14f195] text-xs tracking-widest uppercase">Global Chat</h3>
        </div>
        <div id="chatArea" class="p-5 space-y-4 flex-1 overflow-y-auto text-xs"></div>
        <div class="p-5 bg-[#0b0c0d] border-t border-gray-800">
            <div class="flex gap-2">
                <input type="text" id="chatInput" placeholder="Write message..." class="flex-1 bg-[#1c1f23] border border-gray-700 rounded-xl p-3 outline-none text-white">
                <button onclick="sendMessage()" class="premium-btn px-4 rounded-xl uppercase text-[10px]">Send</button>
            </div>
        </div>
    </aside>

    <div id="loginModal" class="modal-overlay hidden">
        <div class="bg-[#141619] border border-gray-800 w-[400px] p-10 rounded-[2.5rem] text-center">
            <div id="loginStep1">
                <h2 class="text-2xl font-black mb-8 uppercase tracking-widest">Login</h2>
                <input type="text" id="usernameInput" placeholder="Roblox Username" class="auth-input mb-4">
                <p id="authError" class="text-red-500 text-[10px] font-bold uppercase mb-6 hidden">User not found!</p>
                <button id="nextBtn" onclick="verifyRobloxUser()" class="premium-btn w-full py-5 rounded-2xl uppercase">Next Step</button>
                <button onclick="toggleModal('loginModal')" class="mt-6 text-gray-600 text-[10px] uppercase font-black hover:text-white transition">Close</button>
            </div>
            <div id="loginStep2" class="hidden">
                <h2 class="text-xl font-black mb-2 uppercase">Verify</h2>
                <p class="text-gray-400 text-[10px] mb-4 uppercase">Paste this in your Roblox "About":</p>
                <div class="verify-box"><span id="verifyCode" class="text-2xl font-black text-white italic"></span></div>
                <button id="finalLoginBtn" onclick="checkRobloxBio()" class="premium-btn w-full py-5 rounded-2xl uppercase mb-4">Verify Bio</button>
                <button onclick="resetAuth()" class="text-gray-600 text-[10px] uppercase font-bold hover:text-white transition">Back</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let robloxId = null;
        let generatedCode = "";
        
        // Çoklu Proxy Zinciri - Biri çalışmazsa diğeri devreye girer
        const proxies = [
            "https://api.allorigins.win/raw?url=",
            "https://corsproxy.io/?",
            "https://thingproxy.freeboard.io/fetch/"
        ];

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        async function tryFetch(url) {
            let lastError = null;
            for (const proxy of proxies) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(url));
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (err) {
                    lastError = err;
                    console.log(`Proxy ${proxy} failed, trying next...`);
                }
            }
            throw lastError || new Error("Connection failed");
        }

        async function verifyRobloxUser() {
            const user = document.getElementById('usernameInput').value;
            const err = document.getElementById('authError');
            const btn = document.getElementById('nextBtn');
            if(!user) return;

            btn.disabled = true; btn.innerText = "Searching..."; err.classList.add('hidden');

            try {
                // Roblox kullanıcı arama API'si
                const url = `https://users.roblox.com/v1/users/search?keyword=${user}&limit=1`;
                const data = await tryFetch(url);
                
                // Roblox API bazen tam eşleşme vermez, o yüzden ilk sonucu kontrol ediyoruz
                if(data.data && data.data.length > 0 && data.data.name.toLowerCase() === user.toLowerCase()) {
                    robloxId = data.data.id;
                    generatedCode = "BX-" + Math.floor(1000 + Math.random() * 9000);
                    document.getElementById('verifyCode').innerText = generatedCode;
                    document.getElementById('loginStep1').classList.add('hidden');
                    document.getElementById('loginStep2').classList.remove('hidden');
                } else {
                    err.innerText = "English: Username not found on Roblox!"; 
                    err.classList.remove('hidden');
                }
            } catch (e) {
                err.innerText = "System Error: Proxy connection failed. Please try again."; 
                err.classList.remove('hidden');
                console.error(e);
            } finally { btn.disabled = false; btn.innerText = "Next Step"; }
        }

        async function checkRobloxBio() {
            const btn = document.getElementById('finalLoginBtn');
            btn.disabled = true; btn.innerText = "Checking...";
            try {
                const url = `https://users.roblox.com/v1/users/${robloxId}`;
                const data = await tryFetch(url);
                if((data.description || "").includes(generatedCode)) {
                    currentUser = data.name;
                    toggleModal('loginModal');
                    document.getElementById('loginBtn').classList.add('hidden');
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('displayUsername').innerText = currentUser;
                } else { 
                    alert("Code not found! Make sure you saved your Roblox profile bio."); 
                }
            } catch (e) { 
                alert("Connection failed during bio check."); 
            } finally { btn.disabled = false; btn.innerText = "Verify Bio"; }
        }

        function switchTab(tab) {
            const isLobby = tab === 'lobby';
            document.getElementById('lobbyContainer').classList.toggle('hidden', !isLobby);
            document.getElementById('historyContainer').classList.toggle('hidden', isLobby);
            document.getElementById('tab-lobby').className = isLobby ? 'pb-3 tab-active font-bold text-sm tracking-widest uppercase' : 'pb-3 text-gray-500 font-bold text-sm tracking-widest uppercase';
            document.getElementById('tab-history').className = !isLobby ? 'pb-3 tab-active font-bold text-sm tracking-widest uppercase' : 'pb-3 text-gray-500 font-bold text-sm tracking-widest uppercase';
        }

        function resetAuth() {
            document.getElementById('loginStep2').classList.add('hidden');
            document.getElementById('loginStep1').classList.remove('hidden');
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            if(!input.value.trim() || !currentUser) return;
            const chat = document.getElementById('chatArea');
            chat.innerHTML += `<div><span class="text-[#14f195] font-black">${currentUser}:</span> <span class="text-white">${input.value}</span></div>`;
            input.value = ""; chat.scrollTop = chat.scrollHeight;
        }

        function logout() { location.reload(); }
        function checkAuth() { if(!currentUser) toggleModal('loginModal'); }
    </script>
</body>
</html>
